<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Scanner | CyberShield AI</title>

    <link rel="stylesheet" href="../css/main.css">

</head>

<body>

    <section class="scanner-page">

        <div class="scanner-header">

            <span class="badge">
                AI Scanner
            </span>

            <h1>Threat Scanner</h1>

            <p>
                Upload files or enter a URL to scan for threats.
            </p>

        </div>

        <div class="scanner-card">

            <div class="scanner-box">

                <h3>Upload File</h3>

                <input type="file">

            </div>

            <div class="scanner-box">

                <h3>Scan URL</h3>

                <input
                    type="text"
                    placeholder="https://example.com"
                >

            </div>

            <button class="btn btn-primary">
                Start Scan
            </button>

        </div>

        <div class="scan-result">

            <h3>Last Scan</h3>

            <p>Status: Safe</p>

            <p>Threat Level: Low</p>

            <p>AI Confidence: 98%</p>

        </div>

    </section>

</body>

</html>
